<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Facture — SENEGAL INVEST</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Times New Roman', Georgia, serif; background: #f0f4f8; color: #222; }

    .header { background: #1a6fba; padding: 16px 20px; display: flex; align-items: center; gap: 14px; font-family: Arial, sans-serif; }
    .header-title { color: #fff; font-size: 18px; font-weight: bold; }
    .header-sub { color: #b8d8f0; font-size: 12px; margin-top: 2px; }

    .container { max-width: 720px; margin: 20px auto; padding: 0 14px 40px; font-family: Arial, sans-serif; }

    .section { background: #fff; border-radius: 10px; border: 1px solid #dde4ee; padding: 16px; margin-bottom: 14px; }
    .section-title { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccd4e0; border-radius: 6px; font-size: 13px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #1a6fba; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-size: 11px; color: #888; font-weight: 600; padding: 5px 6px; text-align: left; border-bottom: 1px solid #eee; }
    td { padding: 5px 4px; vertical-align: middle; }
    td input { font-size: 12px; padding: 4px 6px; }
    .total-cell { font-size: 12px; font-weight: bold; text-align: right; padding-right: 6px; min-width: 80px; }

    .btn-add { background: none; border: 1px dashed #aab; border-radius: 8px; padding: 8px; font-size: 13px; color: #666; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn-add:hover { background: #f5f7fa; }
    .btn-remove { background: none; border: none; color: #bbb; cursor: pointer; font-size: 16px; padding: 0 4px; }
    .btn-remove:hover { color: #e24b4a; }

    .acompte-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .acompte-row label { flex: 0 0 110px; margin-bottom: 0; font-size: 13px; color: #444; }
    .acompte-row input { flex: 1; }

    .totaux { background: #e6f1fb; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; }
    .totaux-row { display: flex; justify-content: space-between; font-size: 13px; color: #0c447c; padding: 2px 0; }
    .totaux-row.main { font-size: 15px; font-weight: bold; border-top: 1px solid #85b7eb; margin-top: 6px; padding-top: 6px; }
    .totaux-row.net { font-size: 17px; font-weight: bold; border-top: 2px solid #1a6fba; margin-top: 6px; padding-top: 8px; color: #0c447c; }

    .btn-apercu { background: #1a6fba; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 4px; }
    .btn-apercu:hover { background: #155a9a; }
    .btn-pdf { background: #0f6e56; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn-pdf:hover { background: #085041; }
    .btn-pdf:disabled { background: #aaa; cursor: not-allowed; }

    .toast { display: none; background: #0f6e56; color: #fff; border-radius: 8px; padding: 10px 16px; font-size: 13px; text-align: center; margin-top: 8px; }
    .toast.show { display: block; }

    .preview-wrap { background: #f5f7fa; border-radius: 10px; padding: 16px; margin-top: 14px; border: 1px solid #dde; }
    .preview-doc { background: #fff; padding: 30px; border: 1px solid #dde; font-size: 13px; color: #000; font-family: 'Times New Roman', Georgia, serif; min-height: 700px; }

    /* Style fidèle au modèle Word */
    .doc-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 30px; }
    .doc-logo { width: 90px; height: auto; }
    .doc-coords { font-size: 11px; line-height: 1.6; }
    .doc-coords .company-name { color: #2a9fd6; font-weight: bold; font-style: italic; font-size: 13px; }
    .doc-coords .line { font-weight: bold; }
    .doc-coords a { color: #0563c1; text-decoration: underline; }

    .doc-date-block { text-align: right; font-size: 13px; margin-bottom: 30px; }
    .doc-date-block .client-name { font-weight: bold; margin-top: 4px; }

    .doc-facture-num { font-size: 13px; margin-bottom: 16px; }
    .doc-facture-num .underline-label { text-decoration: underline; font-weight: bold; }

    .doc-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 0; }
    .doc-table th, .doc-table td { border: 1px solid #000; padding: 6px 10px; text-align: left; }
    .doc-table th { font-weight: bold; }
    .doc-table td.num { text-align: left; }
    .doc-table .acompte-label, .doc-table .solde-label { font-weight: bold; }
    .doc-table .total-bold { font-weight: bold; }

    .doc-signature { text-align: right; margin-top: 80px; font-size: 13px; }
    .doc-signature .underline-label { text-decoration: underline; font-weight: bold; }
  </style>
</head>

  <div>
    <div class="header-title">Générateur de Facture</div>
    <div class="header-sub">Format officiel SENEGAL INVEST suarl</div>
  </div>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">Informations facture</div>
    <div class="form-row">
      <div><label>Numéro de facture (ex: 0018/06/2026)</label><input type="text" id="fact-num" placeholder="Ex: 0018/06/2026"></div>
      <div><label>Date (lieu, le JJ/MM/AAAA)</label><input type="date" id="fact-date"></div>
    </div>
    <div class="form-row">
      <div><label>Nom du client</label><input type="text" id="cli-nom" placeholder="Ex: SOLAIRE SERVICES"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Désignations, quantités et prix</div>
    <table>
      <thead>
        <tr>
          <th style="width:46%">Désignation</th>
          <th style="width:14%">QTE</th>
          <th style="width:20%">P.U</th>
          <th style="width:14%;text-align:right">Total</th>
          <th style="width:6%"></th>
        </tr>
      </thead>
      <tbody id="mat-body"></tbody>
    </table>
    <button class="btn-add" onclick="addLigne()">+ Ajouter une ligne</button>
  </div>

  <div class="section">
    <div class="section-title">Acomptes (laisser à 0 si aucun)</div>
    <div id="acomptes-body">
      <div class="acompte-row"><label>Acompte HT 1</label><input type="number" class="acompte-input" value="0" min="0" oninput="calcTotaux()"></div>
      <div class="acompte-row"><label>Acompte HT 2</label><input type="number" class="acompte-input" value="0" min="0" oninput="calcTotaux()"></div>
      <div class="acompte-row"><label>Acompte HT 3</label><input type="number" class="acompte-input" value="0" min="0" oninput="calcTotaux()"></div>
    </div>
    <button class="btn-add" onclick="addAcompte()">+ Ajouter un acompte</button>
  </div>

  <div class="totaux">
    <div class="totaux-row main"><span>PRIX TOTAL HT</span><span id="t-total">0 FCFA</span></div>
    <div id="acomptes-display"></div>
    <div class="totaux-row net"><span>SOLDE HT</span><span id="t-net">0 FCFA</span></div>
  </div>

  <button class="btn-apercu" onclick="genererPreview()">Aperçu de la facture</button>
  <button class="btn-pdf" id="btn-pdf" onclick="exportPDF()" disabled>Télécharger en PDF</button>
  <div class="toast" id="toast">PDF généré et téléchargé avec succès !</div>

  <div class="preview-wrap" id="preview-section" style="display:none">
    <div style="font-size:13px;font-weight:bold;margin-bottom:10px;color:#333;font-family:Arial,sans-serif;">Aperçu de la facture</div>
    <div class="preview-doc" id="preview-content"></div>
  </div>

</div>

<script>
  let lignes = [];

  function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }

  function addLigne(nom='', qte=1, pu=0){
    const id = Date.now() + Math.random();
    lignes.push({id, nom, qte, pu});
    renderLignes();
  }

  function removeLigne(id){
    lignes = lignes.filter(l => l.id !== id);
    renderLignes();
    calcTotaux();
  }

  function renderLignes(){
    const tbody = document.getElementById('mat-body');
    tbody.innerHTML = '';
    lignes.forEach(l => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" value="${l.nom}" placeholder="Ex: Réalisation de forages" oninput="updateLigne(${l.id},'nom',this.value)"></td>
        <td><input type="number" value="${l.qte}" min="0" style="width:60px" oninput="updateLigne(${l.id},'qte',this.value)"></td>
        <td><input type="number" value="${l.pu}" min="0" placeholder="0" oninput="updateLigne(${l.id},'pu',this.value)"></td>
        <td class="total-cell">${fmt(l.qte*l.pu)}</td>
        <td><button class="btn-remove" onclick="removeLigne(${l.id})">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
    calcTotaux();
  }

  function updateLigne(id, field, val){
    const l = lignes.find(x => x.id === id);
    if(!l) return;
    if(field==='nom') l.nom=val;
    else if(field==='qte') l.qte=parseFloat(val)||0;
    else if(field==='pu') l.pu=parseFloat(val)||0;
    const idx = lignes.findIndex(x => x.id === id);
    const rows = document.querySelectorAll('#mat-body tr');
    if(rows[idx]) rows[idx].querySelector('.total-cell').textContent = fmt(l.qte*l.pu);
    calcTotaux();
  }

  function addAcompte(){
    const container = document.getElementById('acomptes-body');
    const n = container.querySelectorAll('.acompte-row').length + 1;
    const div = document.createElement('div');
    div.className = 'acompte-row';
    div.innerHTML = `<label>Acompte HT ${n}</label><input type="number" class="acompte-input" value="0" min="0" oninput="calcTotaux()">`;
    container.appendChild(div);
  }

  function getValeurs(){
    const total = lignes.reduce((s,l) => s+l.qte*l.pu, 0);
    const acomptes = Array.from(document.querySelectorAll('.acompte-input')).map(i => parseFloat(i.value)||0);
    const totalAcomptes = acomptes.reduce((s,a)=>s+a,0);
    const net = total - totalAcomptes;
    return {total, acomptes, totalAcomptes, net};
  }

  function calcTotaux(){
    const {total, acomptes, net} = getValeurs();
    document.getElementById('t-total').textContent = fmt(total)+' FCFA';
    document.getElementById('t-net').textContent = fmt(net)+' FCFA';
    const display = document.getElementById('acomptes-display');
    display.innerHTML = acomptes.map((a,i) => a>0 ? `<div class="totaux-row"><span>Acompte HT ${i+1}</span><span>${fmt(a)} FCFA</span></div>` : '').join('');
  }

  function genererPreview(){
    const factNum = document.getElementById('fact-num').value || '----/--/----';
    const nom = document.getElementById('cli-nom').value || 'CLIENT';
    const dateInput = document.getElementById('fact-date').value;
    let dateStr = '__/__/____';
    if(dateInput){
      const d = new Date(dateInput + 'T00:00:00');
      dateStr = d.toLocaleDateString('fr-FR');
    }
    const {total, acomptes, net} = getValeurs();

    const lignesHTML = lignes.map(l=>`
      <tr><td>-&nbsp;&nbsp;${l.nom||'--'}</td><td>${l.qte}</td>
      <td>${fmt(l.pu)}</td><td class="total-bold">${fmt(l.qte*l.pu)}</td></tr>
    `).join('');

    const acomptesHTML = acomptes.map((a,i) => a>0 ? `
      <tr><td colspan="3" class="acompte-label">ACOMPTE HT ${i+1}</td><td>${fmt(a)} FCFA</td></tr>
    `: '').join('');

        <div><strong>KINIABOUR</strong>, le <strong>${dateStr}</strong></div>
        <div class="client-name">${nom}</div>
      </div>

      <div class="doc-facture-num"><span class="underline-label">FACTURE</span> : ${factNum}</div>

      <table class="doc-table">
        <thead>
          <tr><th>DESIGNATION</th><th>QTE</th><th>P. U</th><th>PRIX TOTAL</th></tr>
        </thead>
        <tbody>
          ${lignesHTML}
        </tbody>
      </table>
      <table class="doc-table" style="margin-top:-1px;">
        ${acomptesHTML}
        <tr><td colspan="3" class="solde-label">SOLDE HT</td><td class="total-bold">${fmt(net)} FCFA</td></tr>
      </table>

      <div class="doc-signature">
        <span class="underline-label">LA DIRECTION</span>
      </div>
    `;
    document.getElementById('preview-section').style.display = 'block';
    document.getElementById('btn-pdf').disabled = false;
    document.getElementById('preview-section').scrollIntoView({behavior:'smooth', block:'start'});
  }

  async function exportPDF(){
    const btnPdf = document.getElementById('btn-pdf');
    btnPdf.disabled = true;
    btnPdf.textContent = 'Génération en cours...';

    const element = document.getElementById('preview-content');
    element.style.background = '#ffffff';

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    const pageWidth = 210;
    const pageHeight = 297;
    const margin = 10;
    const imgWidth = pageWidth - margin * 2;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    doc.addImage(imgData, 'JPEG', margin, margin, imgWidth, imgHeight);
    heightLeft -= (pageHeight - margin * 2);

    while (heightLeft > 0) {
      doc.addPage();
      const yOffset = -(imgHeight - heightLeft) - margin;
      doc.addImage(imgData, 'JPEG', margin, yOffset + margin, imgWidth, imgHeight);
      heightLeft -= (pageHeight - margin * 2);
    }

    const factNum = (document.getElementById('fact-num').value || 'facture').replace(/\//g,'-');
    doc.save('Facture-' + factNum + '.pdf');

    btnPdf.disabled = false;
    btnPdf.textContent = 'Télécharger en PDF';

    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  addLigne('Réalisation de forages', 1, 0);
  calcTotaux();
</script>
</body>
